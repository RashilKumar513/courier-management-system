{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0"><i class="fas fa-box me-2"></i>Create New Shipment</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="mb-3">Sender Information</h5>
                            <div class="mb-3">
                                <label for="sender_name" class="form-label">Sender Name</label>
                                <input type="text" class="form-control" id="sender_name" name="sender_name" required>
                            </div>
                            <div class="mb-3">
                                <label for="sender_address" class="form-label">Sender Address</label>
                                <textarea class="form-control" id="sender_address" name="sender_address" rows="3" required></textarea>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h5 class="mb-3">Receiver Information</h5>
                            <div class="mb-3">
                                <label for="receiver_name" class="form-label">Receiver Name</label>
                                <input type="text" class="form-control" id="receiver_name" name="receiver_name" required>
                            </div>
                            <div class="mb-3">
                                <label for="receiver_address" class="form-label">Receiver Address</label>
                                <textarea class="form-control" id="receiver_address" name="receiver_address" rows="3" required></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="package_description" class="form-label">Package Description</label>
                                <input type="text" class="form-control" id="package_description" name="package_description" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="weight" class="form-label">Weight (kg)</label>
                                <input type="number" step="0.1" class="form-control" id="weight" name="weight" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="courier_id" class="form-label">Assign Courier</label>
                        <select class="form-select" id="courier_id" name="courier_id" required>
                            <option value="" selected disabled>Select Courier</option>
                            {% for courier in couriers %}
                            <option value="{{ courier.id }}">{{ courier.name }} ({{ courier.vehicle_type }})</option>
                            {% endfor %}
                        </select>
                        {% if not couriers %}
                        <div class="form-text text-danger">No available couriers. Please add couriers first.</div>
                        {% endif %}
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" {% if not couriers %}disabled{% endif %}>Create Shipment</button>
                        <a href="{{ url_for('shipments') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
