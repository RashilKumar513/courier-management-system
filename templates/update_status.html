{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0"><i class="fas fa-sync me-2"></i>Update Shipment Status</h4>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <h5>Shipment Details</h5>
                    <p><strong>ID:</strong> {{ shipment.id }}</p>
                    <p><strong>Sender:</strong> {{ shipment.sender_name }}</p>
                    <p><strong>Receiver:</strong> {{ shipment.receiver_name }}</p>
                    <p><strong>Current Status:</strong> 
                        <span class="badge 
                            {% if shipment.status == 'Delivered' %}bg-success
                            {% elif shipment.status == 'Cancelled' %}bg-danger
                            {% elif shipment.status == 'In Transit' %}bg-primary
                            {% elif shipment.status == 'Out for Delivery' %}bg-warning
                            {% else %}bg-secondary{% endif %}">
                            {{ shipment.status }}
                        </span>
                    </p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="status" class="form-label">Update Status</label>
                        <select class="form-select" id="status" name="status" required>
                            {% for status in status_options %}
                            <option value="{{ status }}" {% if status == shipment.status %}selected{% endif %}>{{ status }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Update Status</button>
                        <a href="{{ url_for('shipments') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
